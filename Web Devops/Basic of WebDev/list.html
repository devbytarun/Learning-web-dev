<!DOCTYPE html>
<html lang="en">
<head>
    <title>List in Html</title>
</head>
<body>
<h1>Grocery</h1>
<ul>
    <li>Milk</li>
    <li>chips</li>
    <li>Wheat</li>
    <li>rice</li>
    <p>This one is unorderd list.</p>
</ul><hr>
<ol>
    <li>Milk</li>
    <li>chips</li>
    <li>Wheat</li>
    <li>rice</li>
    <P>This one is orderd list.</P>
</ol>
</body>
</html>
