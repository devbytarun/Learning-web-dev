<!DOCTYPE html>
<html lang="en">

<head>
    <title>Tables</title>
</head>

<body>
    <table border="1px" cellpadding="2px">
        <caption>5th class</caption>
        <tr>
            <th>Roll no.</th>
            <th>Name</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Aashish</td>
        </tr>
    </table>

    <table border="1px">
        <caption>Rows & Columns</caption>
        <thead>
            <tr>
                <th rowspan="2">Name</th>
                <th colspan="2">Class 5th</th>
            <tr>
                <th>Roll No</th>
                <th>Marks</th>
            </tr>
            </th>
        </thead>
        <tbody>
            <tr>
                <td>Aashsih</td>
                <td>12</td>
                <td>1000%</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
