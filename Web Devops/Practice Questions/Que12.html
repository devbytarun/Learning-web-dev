<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    #main{
        background-color: rgb(255, 170, 0);
        height: 200px;
        width: 200px;
        border-radius: 50%;
        margin: 0% auto;
    }

    #circle1{
          background-color: rgb(0, 0, 0);
        height: 50px;
        width: 50px;
        border-radius: 50%;
        position: relative;
        top: 50px;
        left: 25px;
    }
    #circle2{
          background-color: rgb(0, 0, 0);
        height: 50px;
        width: 50px;
        border-radius: 50%;
        position: relative;
        top: 0px;
        left: 120px;
    }

    .mouth{ 
        height: 50px;
        width: 100px;
        background-color: brown;
    }
  </style>
</head>
<body>
    <div id="main">
        <div id="circle1"></div>
        <div id="circle2"></div>
        <div class="mouth"></div>
    </div>

</body>
</html>
